description		= "Open source AX Community module"

/*	Declare module name and project properties	*/
ext
{
	name			= 'axCommunity'
	project.group	= 'Community'
}

/*	Declare niagaraModule properties	*/
niagaraModule
{
	moduleName			= "axCommunity"
	preferredSymbol		= "axc4"
	runtimeProfile		= "rt"

	modulePart 
	{
		name			= "axCommunity-wb"
		runtimeProfile	= "wb"
	}

	modulePart 
	{
		name			= "axCommunity-doc"
		runtimeProfile	= "doc"
	}
	
	modulePart 
	{
		name			= "axCommunity-ux"
		runtimeProfile	= "ux"
	}
}

repositories 
{
	mavenCentral()
	mavenLocal()
	
	flatDir 
	{
		dirs 'libs'
	}
}

/*	Declare compile and test dependencies	*/
dependencies
{
	compile "Tridium:baja:4.0.0"
	compile "Tridium:control-rt:4.0.0"
	compile "Tridium:driver-rt:4.0.0"
	compile "Tridium:platform-rt:4.0.0"
	compile "Tridium:bql-rt:4.0.0"
	compile "Tridium:alarm-rt:4.0.0"
	compile "Tridium:history-rt:4.0.0"
	compile "Tridium:gx-rt:4.0.0"
	compile "Tridium:kitControl-rt:4.0.0"
	compile "Tridium:nre:4.0.0"
	
	compile "Tridium:platform-wb:4.0.0"
    compile "Tridium:platDaemon-rt:4.0.0"
    compile "Tridium:gx-wb:4.0.0"
    compile "Tridium:bajaui-wb:4.0.0"
    compile "Tridium:workbench-wb:4.0.0"
    compile "Tridium:wbutil-wb:4.0.0"
    compile "Tridium:hx-wb:4.0.0"
    compile "Tridium:file-rt:4.0.0"
    compile "Tridium:fox-rt:4.0.0"
    compile "Tridium:nsh-wb:4.0.0"
    compile "Tridium:pdf-wb:4.0.0"
    compile "Tridium:bajaux-ux:4.0.0"
    compile "Tridium:template-rt:4.0.0"
    compile "Tridium:webEditors-ux:4.0.0"
    compile "Tridium:js-ux:4.0.0"
    compile "Tridium:net-rt:4.0.0"
    compile "Tridium:web-rt:4.0.0"
    compile "Tridium:bajaux-rt:4.0.0"
    compile "Tridium:bajaScript-ux:4.0.0"
    compile "Tridium:query-rt:4.0.0"
    compile "Tridium:search-rt:4.0.0"
    compile "Tridium:box-rt:4.0.0"
    compile "Tridium:neql-rt:4.0.0"
    compile "Tridium:jetty-rt:4.0.0"
    compile "Tridium:entityIo-rt:4.0.0"
    compile "Tridium:chart-rt:4.0.0"
}

/*	Include additional files in module jar	*/
jar 
{
	doFirst 
	{
        from { configurations.uberjar.collect { it.isDirectory() ? it : zipTree(it) } } 
    }
    exclude '*META-INF/*.RSA', '*META-INF/*.SF','*META-INF/*.DSA' 
	
	from("src") 
	{
		include 'relNotes/*.*'
		include "org/axcommunity/niagara/graphics/*.*"
		include "org/axcommunity/niagara/bogs/*.*"
	}
}

/*	Declare compile and test dependencies	*/
moduleTestJar 
{
	from('srcTest') 
	{
		
	}
}
