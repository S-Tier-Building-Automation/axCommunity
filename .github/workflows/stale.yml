name: Stale

# Keeps the PR/issue queue clean by labelling inactive items stale and closing
# them if they stay quiet. Dependency PRs and anything pinned/security/keep are
# exempt.

on:
  schedule:
    - cron: '30 6 * * *'
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/stale@v10
        with:
          days-before-stale: 45
          days-before-close: 14
          stale-issue-label: stale
          stale-pr-label: stale
          exempt-issue-labels: 'pinned,security,keep'
          exempt-pr-labels: 'pinned,security,keep,dependencies,automerge'
          exempt-all-milestones: true
          stale-issue-message: >
            This issue has had no activity for 45 days and is now marked stale.
            Comment or remove the `stale` label to keep it open; otherwise it will
            be closed in 14 days.
          stale-pr-message: >
            This pull request has had no activity for 45 days and is now marked
            stale. Push a commit or comment to keep it open; otherwise it will be
            closed in 14 days.
          close-issue-message: >
            Closing after 14 days of inactivity since being marked stale. Reopen
            if this is still relevant.
          close-pr-message: >
            Closing after 14 days of inactivity since being marked stale. Reopen
            if you'd like to continue.
