name: PR Checks

# Lightweight PR monitoring that complements ci.yml (which provides the build
# "CI Gate"). This adds conventional-commit PR-title linting — required so
# release-please can derive the next version from merged PR titles — and a single
# aggregated "PR Gate" status that branch protection can require.

on:
  pull_request:
    types: [opened, synchronize, reopened, edited]

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: pr-checks-${{ github.ref }}
  cancel-in-progress: true

jobs:
  conventional-title:
    name: Conventional PR Title
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: amannn/action-semantic-pull-request@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # Squash-merge uses the PR title as the commit subject, so linting the
          # title is what makes release-please's version bump deterministic.
          types: |
            feat
            fix
            docs
            refactor
            test
            chore
            ci
            perf
            build
            revert
          scopes: |
            rt
            wb
            ux
            doc
            extensions
            logic
            math
            conversion
            string
            time
            bql
            hvac
            weather
            system
            web
            batch
            script
            ci
            deps
            main
            release
          requireScope: false

  pr-gate:
    name: PR Gate
    # always() so the gate reports even when an upstream job is skipped; a skipped
    # check counts as pass, only failure/cancellation fails the gate.
    if: always()
    needs: [conventional-title]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check results
        run: |
          for result in "${{ needs.conventional-title.result }}"; do
            if [[ "$result" == "failure" || "$result" == "cancelled" ]]; then
              echo "::error::Required PR check did not pass: $result"
              exit 1
            fi
          done
          echo "PR Gate passed."
