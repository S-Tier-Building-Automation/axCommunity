name: Auto-merge

# Enables GitHub's native auto-merge (squash) so a PR merges itself once branch
# protection is satisfied (required checks green + reviews met). Two paths:
#   1. Human PRs labelled `automerge` — explicit opt-in.
#   2. Dependabot patch/minor bumps — approved + auto-merged automatically.
#
# Uses pull_request_target so the GITHUB_TOKEN has write scope (needed to merge
# and to act on Dependabot PRs). SAFE because no job checks out or executes PR
# code — every step only calls the GitHub API.
#
# Prerequisite: enable "Allow auto-merge" in repo Settings → General, and require
# the "PR Gate" + "CI Gate" checks in branch protection.

on:
  pull_request_target:
    types: [labeled, opened, reopened, synchronize, ready_for_review]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: auto-merge-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  label-automerge:
    name: Auto-merge labelled PRs
    if: >-
      github.actor != 'dependabot[bot]' &&
      github.event.pull_request.draft == false &&
      contains(github.event.pull_request.labels.*.name, 'automerge')
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Enable auto-merge (squash)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh pr merge --auto --squash "${{ github.event.pull_request.number }}" -R "${{ github.repository }}"

  dependabot-automerge:
    name: Auto-merge Dependabot patch/minor
    if: github.actor == 'dependabot[bot]' && github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Fetch Dependabot metadata
        id: meta
        uses: dependabot/fetch-metadata@v3
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Enable auto-merge for patch/minor updates
        if: >-
          steps.meta.outputs.update-type == 'version-update:semver-patch' ||
          steps.meta.outputs.update-type == 'version-update:semver-minor'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        # No `gh pr review --approve`: GITHUB_TOKEN approvals are blocked by
        # default ("Allow GitHub Actions to ... approve pull requests" is off) and
        # would hard-fail the job. Native auto-merge + required checks gate this;
        # set "Required approvals" to 0 for Dependabot or rely on the checks.
        run: gh pr merge --auto --squash "$PR_URL"
